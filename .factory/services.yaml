commands:
  install: npm install
  lint: npm run lint
  test: npm run test
  typecheck: npx tsc --noEmit
  build: npm run build
  falkor_tests: node --test --test-concurrency=3 --loader ./tests/ts-loader.js tests/falkordb-people-graph.test.ts
  graph_route_tests: node --test --test-concurrency=3 --loader ./tests/ts-loader.js tests/ai-cron-routes.test.ts tests/routes/ai/tool-executor.test.ts
  live_graph_check: node --loader ./tests/ts-loader.js scripts/test-falkor-local.ts

services:
  falkor_db:
    start: docker start falkordb
    stop: docker stop falkordb
    healthcheck: redis-cli -p 6379 ping
    port: 6379
    depends_on: []

  falkor_browser:
    start: docker start falkordb
    stop: docker stop falkordb
    healthcheck: curl -sf http://127.0.0.1:3001/
    port: 3001
    depends_on: [falkor_db]

  next_app:
    start: PORT=3000 npm run dev
    stop: lsof -ti :3000 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3000/
    port: 3000
    depends_on: [falkor_db]
